# arXiv categories queried by scripts/fetch_arxiv.py via the arXiv Query API.
# Pulls papers submitted in the last --days (default 7), so a real rolling
# window — works on weekends and any other day. Categories cover the spectrum
# of hardware-relevant arXiv: devices, architecture, ML systems, applied
# physics, signal processing.
arxiv_categories:
  - cs.AR           # Hardware Architecture
  - cs.ET           # Emerging Technologies
  - eess.SP         # Signal Processing
  - physics.app-ph  # Applied Physics
  - cs.AI           # AI — for accelerator-relevant papers
  - cs.LG           # Machine Learning — systems & efficiency
  - cs.CL           # NLP — LLM systems papers
  - cs.DC           # Distributed / Parallel — training & inference systems

# Semantic Scholar Graph API queries used by scripts/fetch_semscholar.py.
# Coverage complement to arXiv: catches conference proceedings (ISSCC, IEDM,
# MICRO, etc.), IEEE journal papers, and papers that landed on Xplore/DOI
# without an arXiv preprint. Each query goes through S2's free unauthenticated
# tier (no key required for the volume we use).
semscholar_queries:
  - "compute-in-memory CMOS"
  - "neuromorphic chip ASIC"
  - "advanced packaging chiplet"
  - "ferroelectric transistor memory"
  - "silicon photonics integrated"
  - "VLSI processor architecture"
  - "HBM memory bandwidth"
  - "GaN SiC power semiconductor"
  - "LLM inference accelerator"
  - "spiking neural network hardware"

# Research sections used by research.html. Same taxonomy idea: stable IDs,
# agent omits empty ones per edition.
research_sections:
