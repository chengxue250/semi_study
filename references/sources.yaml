# Semiconductor news sources.
#
# Two roles:
#   - `feeds`: machine-pullable RSS/Atom URLs. scripts/fetch_rss.py uses these.
#   - `outlets`: human-curated list the agent should also consult via web search /
#               direct fetch (paywalled or non-RSS sources). The agent reads names
#               and home URLs and decides what to look at.
#
# Edit freely. Lines starting with `#` are comments. Any feed that 404s or stops
# updating will be flagged when you run: `python3 scripts/fetch_rss.py --probe`.

feeds:
  # --- English: analysis & industry press --------------------------------------
  - name: SemiAnalysis
    url: https://www.semianalysis.com/feed
    weight: high     # analysis-heavy, prefer when available
  - name: SemiWiki
    url: https://semiwiki.com/feed/
  - name: EE Times
    url: https://www.eetimes.com/feed/
  - name: EE Times Asia
    url: https://www.eetasia.com/feed/
  - name: Electronics Weekly
    url: https://www.electronicsweekly.com/feed/
  - name: The Next Platform
    url: https://www.nextplatform.com/feed/
  - name: ServeTheHome
    url: https://www.servethehome.com/feed/
  - name: AnandTech (archive)
    url: https://www.anandtech.com/rss/
    note: site is in maintenance mode but feed sometimes carries notes
  - name: Tom's Hardware
    url: https://www.tomshardware.com/feeds/all
  - name: Wccftech
    url: https://wccftech.com/feed/
  - name: HotHardware
    url: https://hothardware.com/news.rss
  - name: The Register (Systems)
    url: https://www.theregister.com/headlines.atom
  - name: IEEE Spectrum — Semiconductors
    url: https://spectrum.ieee.org/feeds/topic/semiconductors.rss
  - name: Embedded.com
    url: https://www.embedded.com/feed/

  # --- English: wires & geopolitics --------------------------------------------
  - name: Reuters Technology (Google News)
    url: https://news.google.com/rss/search?q=semiconductor+when:1d&hl=en-US&gl=US&ceid=US:en
    note: aggregator query; widen window via --since-hours if needed
  - name: Nikkei Asia — Tech
    url: https://asia.nikkei.com/rss/feed/nar
    note: many items paywalled; treat as a tip sheet

  # --- Chinese-language sources ------------------------------------------------
  - name: 半导体行业观察
    url: https://www.semiinsights.com/feed
  - name: 集微网 (ijiwei)
    url: https://www.laoyaoba.com/rss
    note: feed format varies; the probe will flag if it breaks
  - name: 36氪 — 半导体
    url: https://36kr.com/feed-search?q=%E5%8D%8A%E5%AF%BC%E4%BD%93

  # --- Topical Google News queries (broad safety net) --------------------------
  - name: GNews — TSMC
    url: https://news.google.com/rss/search?q=TSMC+when:1d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — ASML
    url: https://news.google.com/rss/search?q=ASML+lithography+when:1d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — HBM
    url: https://news.google.com/rss/search?q=HBM+memory+when:1d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Chip export controls
    url: https://news.google.com/rss/search?q=chip+export+controls+when:1d&hl=en-US&gl=US&ceid=US:en

  # --- Challengers & non-incumbents -------------------------------------------
  # These are easy to miss in mainstream trade press. Per-company Google News
  # queries are the most reliable way to catch them on the day they ship news.
  - name: GNews — Cerebras
    url: https://news.google.com/rss/search?q=Cerebras+chip+OR+wafer-scale+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Groq
    url: https://news.google.com/rss/search?q=Groq+LPU+OR+inference+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Tenstorrent
    url: https://news.google.com/rss/search?q=Tenstorrent+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — SambaNova
    url: https://news.google.com/rss/search?q=SambaNova+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Etched
    url: https://news.google.com/rss/search?q=%22Etched%22+chip+OR+Sohu+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Rebellions / Furiosa
    url: https://news.google.com/rss/search?q=Rebellions+OR+Furiosa+chip+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Rivos
    url: https://news.google.com/rss/search?q=Rivos+RISC-V+chip+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Lightmatter / Ayar Labs / Celestial AI
    url: https://news.google.com/rss/search?q=%22Lightmatter%22+OR+%22Ayar+Labs%22+OR+%22Celestial+AI%22+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — EnCharge / Rain / Mythic
    url: https://news.google.com/rss/search?q=%22EnCharge+AI%22+OR+%22Rain+AI%22+OR+%22Mythic+AI%22+when:7d&hl=en-US&gl=US&ceid=US:en
  - name: GNews — Hailo / Esperanto / d-Matrix
    url: https://news.google.com/rss/search?q=Hailo+OR+%22Esperanto+Technologies%22+OR+%22d-Matrix%22+chip+when:7d&hl=en-US&gl=US&ceid=US:en

  # --- Academic / research feeds (used by research.html) -----------------------
  # These have role=research so fetch_rss can isolate them for the research page.
  #
  # NOTE: arXiv is *not* listed here — its RSS feeds only carry the current
  # day's announcement batch (empty on weekends, missing all prior days), so
  # they're unsuitable for a 7-day rolling window. arXiv coverage goes through
  # scripts/fetch_arxiv.py (uses the arXiv Query API with a real date range);
  # see the `arxiv_categories` section below.
  - name: Nature Electronics — current issue
    url: https://www.nature.com/natelectron/current_issue/rss
    role: research

# Human-curated outlets the agent should consult even when there is no working
# RSS feed (paywalled, JS-only, or behind a login). Use web search or direct
# fetch.
outlets:
  - name: The Information
    home: https://www.theinformation.com
    note: paywalled — read summaries only from secondary coverage
  - name: Bloomberg Technology
    home: https://www.bloomberg.com/technology
    note: paywalled
  - name: Financial Times — Semiconductors
    home: https://www.ft.com/semiconductors
    note: paywalled
  - name: DIGITIMES Asia
    home: https://www.digitimes.com
    note: supply-chain scoops, much of it paywalled
  - name: Stratechery
    home: https://stratechery.com
    note: strategy commentary; paywalled but free weekly piece
  - name: Chip History Center
    home: https://www.chiphistory.org
    note: archival/research context only
  - name: 芯东西 (zhidongxi)
    home: https://zhidx.com
  - name: 爱集微 (aijiwei)
    home: https://www.laoyaoba.com

