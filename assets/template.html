<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="edition-date" content="{{ISO_DATE}}">
<meta name="generator" content="semi-news-daily">
<title>{{THEME_EN}} — Semi News {{DATE}}</title>
<style>
  :root {
    --bg: #fbfaf7;
    --fg: #18181b;
    --muted: #6b6b6b;
    --rule: #e7e3da;
    --link: #1f3a8a;
    --accent: #b1370b;
    --featured-bg: #f3efe5;
    --max-w: 720px;
    --serif: "Newsreader", "Charter", "Iowan Old Style", "Source Serif Pro",
             Georgia, "Songti SC", "Source Han Serif SC", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue",
            "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14130f;
      --fg: #ece9e1;
      --muted: #9a9690;
      --rule: #2b2925;
      --link: #9ab4ff;
      --accent: #e88a55;
      --featured-bg: #1c1a16;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding: 32px 20px 80px;
  }
  main {
    max-width: var(--max-w);
    margin: 0 auto;
  }

  /* Masthead */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 36px;
    letter-spacing: 0.02em;
  }
  .brand { flex-shrink: 0; font-family: var(--serif); font-size: 15px; color: var(--fg); }
  .top-bar > div:last-child { text-align: right; }
  .brand .dot { color: var(--accent); }
  .lang-toggle button {
    background: none; border: none; color: var(--muted);
    font: inherit; cursor: pointer; padding: 0 4px;
  }
  .lang-toggle button[aria-pressed="true"] { color: var(--fg); font-weight: 600; }
  .lang-toggle .sep { opacity: 0.4; }
  .nav-modes a {
    color: var(--muted);
    text-decoration: none;
    padding: 0 4px;
  }
  .nav-modes a.current { color: var(--fg); font-weight: 600; }
  .nav-modes .sep { opacity: 0.4; }
  .lang-toggle { margin-left: 14px; }

  /* Theme headline */
  .masthead { margin-bottom: 48px; }
  .masthead .date {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(34px, 5.5vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin: 0 0 18px;
  }
  .masthead .dek {
    font-family: var(--serif);
    font-size: clamp(18px, 2.2vw, 22px);
    line-height: 1.4;
    color: var(--muted);
    margin: 0;
  }

  /* Sections */
  section.cat { margin: 56px 0 0; }
  section.cat > h2 {
    font-family: var(--sans);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    margin: 0 0 24px;
  }

  /* Story cards */
  article.story {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  article.story:last-child { border-bottom: none; }
  article.story.featured {
    background: var(--featured-bg);
    margin: 0 -16px 12px;
    padding: 20px 16px;
    border-radius: 4px;
    border-bottom: none;
  }
  article.story h3 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 20px;
    line-height: 1.3;
    margin: 0 0 6px;
  }
  article.story.featured h3 { font-size: 24px; }
  article.story h3 a { color: var(--fg); text-decoration: none; }
  article.story h3 a:hover { text-decoration: underline; text-decoration-color: var(--accent); }
  article.story .meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  article.story .meta .source { color: var(--accent); }
  article.story .summary { margin: 0; font-size: 16px; line-height: 1.55; }

  /* Language visibility and bilingual layout. */
  body[data-lang="en"] .zh { display: none; }
  body[data-lang="zh"] .en { display: none; }
  body[data-lang="zh"] { font-family: var(--sans); }
  body[data-lang="zh"] .masthead h1,
  body[data-lang="zh"] article.story h3 {
    font-family: "Songti SC", "Source Han Serif SC", "Noto Serif CJK SC", var(--serif);
  }
  body[data-lang="both"] .masthead .date .zh,
  body[data-lang="both"] .masthead h1 .zh,
  body[data-lang="both"] .masthead .dek .zh,
  body[data-lang="both"] article.story h3 .zh,
  body[data-lang="both"] article.story .meta .zh,
  body[data-lang="both"] article.story .summary .zh,
  body[data-lang="both"] footer .zh {
    display: block;
  }
  body[data-lang="both"] .masthead h1 .zh,
  body[data-lang="both"] article.story h3 .zh {
    margin-top: 5px;
    font-family: "Songti SC", "Source Han Serif SC", "Noto Serif CJK SC", var(--serif);
  }
  body[data-lang="both"] .masthead .dek .zh,
  body[data-lang="both"] article.story .summary .zh {
    margin-top: 9px;
  }
  body[data-lang="both"] .masthead .date .zh,
  body[data-lang="both"] article.story .meta .zh,
  body[data-lang="both"] footer .zh {
    margin-top: 2px;
  }
  body[data-lang="both"] .nav-modes a .zh::before,
  body[data-lang="both"] section.cat > h2 .zh::before {
    content: " / ";
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer a { color: var(--muted); }
  footer a:hover { color: var(--fg); }
</style>
</head>
<body data-lang="both">
<main>

  <div class="top-bar">
    <div class="brand">semi<span class="dot">·</span>news</div>
    <div>
      <span class="nav-modes">
        <a href="index.html" class="current"><span class="en">Headlines</span><span class="zh">要闻</span></a>
        <span class="sep">/</span>
        <a href="research.html"><span class="en">Research</span><span class="zh">研究</span></a>
      </span>
      <span class="lang-toggle" role="group" aria-label="Language">
        <button data-set-lang="both" aria-pressed="true">中英</button>
        <span class="sep">/</span>
        <button data-set-lang="en" aria-pressed="false">EN</button>
        <span class="sep">/</span>
        <button data-set-lang="zh" aria-pressed="false">中文</button>
      </span>
    </div>
  </div>

  <header class="masthead">
    <div class="date">
      <span class="en">{{DATE_LONG_EN}}</span>
      <span class="zh">{{DATE_LONG_ZH}}</span>
    </div>
    <h1>
      <span class="en">{{THEME_EN}}</span>
      <span class="zh">{{THEME_ZH}}</span>
    </h1>
    <p class="dek">
      <span class="en">{{DEK_EN}}</span>
      <span class="zh">{{DEK_ZH}}</span>
    </p>
  </header>

  {{SECTIONS}}

  <footer>
    <div>
      <span class="en">Built {{GENERATED_AT}} · <a href="archive.html">Archive</a></span>
      <span class="zh">生成于 {{GENERATED_AT}} · <a href="archive.html">往期</a></span>
    </div>
    <div>
      <span class="en">Semi News Daily — a curated chip-industry digest.</span>
      <span class="zh">半导体每日要闻 — 精选芯片产业摘要。</span>
    </div>
  </footer>

</main>

<script>
  (function () {
    var body = document.body;
    var mode = "both";
    try {
      var saved = localStorage.getItem("semi-news-lang-v2");
      if (saved === "both" || saved === "en" || saved === "zh") mode = saved;
    } catch (e) {}
    function setMode(nextMode) {
      mode = nextMode;
      body.setAttribute("data-lang", mode);
      document.documentElement.lang = mode === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-set-lang]").forEach(function (button) {
        button.setAttribute("aria-pressed", button.getAttribute("data-set-lang") === mode ? "true" : "false");
      });
    }
    setMode(mode);
    document.querySelectorAll("[data-set-lang]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var nextMode = btn.getAttribute("data-set-lang");
        setMode(nextMode);
        try { localStorage.setItem("semi-news-lang-v2", nextMode); } catch (e) {}
      });
    });
  })();
</script>
</body>
</html>
